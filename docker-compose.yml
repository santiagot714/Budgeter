services:
  db:
    container_name: budgeter-db
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - budgeter-network
  redis:
    container_name: budgeter-redis
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - budgeter-network
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - ${REDIS_PORT}:${REDIS_PORT}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h localhost -p ${REDIS_PORT} ping"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  postgres_data: 
  redis_data:
networks:
  budgeter-network:
    driver: bridge